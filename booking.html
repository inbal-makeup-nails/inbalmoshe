<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inbal Moshe | Makeup & Nails - קביעת תור</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="topbar">
    <a href="index.html" class="back-home">← חזרה לבית</a>
    <span class="topbar-logo">💅 Inbal Moshe</span>
  </div>

  <main class="page-main">
    <div class="page-header">
      <h2>קביעת תור</h2>
      <p class="section-subtitle">בחרי תאריך ושעה פנויה</p>
    </div>

    <div class="booking-container">

      <!-- שלב 1: יומן -->
      <div id="step1" class="booking-step">
        <div class="step-label">שלב 1 מתוך 3 — בחרי תאריך</div>
        <div class="calendar-header">
          <button class="cal-nav" onclick="changeMonth(-1)">&#8250;</button>
          <span id="calMonthLabel"></span>
          <button class="cal-nav" onclick="changeMonth(1)">&#8249;</button>
        </div>
        <div class="calendar-legend">
          <span class="legend-item"><span class="legend-dot available"></span> פנוי</span>
          <span class="legend-item"><span class="legend-dot unavailable"></span> סגור</span>
          <span class="legend-item"><span class="legend-dot full"></span> מלא</span>
        </div>
        <div class="calendar-weekdays">
          <span>א</span><span>ב</span><span>ג</span><span>ד</span><span>ה</span><span>ו</span><span>ש</span>
        </div>
        <div class="calendar-grid" id="calendarGrid"></div>
      </div>

      <!-- שלב 2: שעות -->
      <div id="step2" class="booking-step hidden">
        <div class="step-label">שלב 2 מתוך 3 — בחרי שעה</div>
        <h3 id="selectedDateLabel"></h3>
        <p class="section-subtitle">בחרי שעה פנויה</p>
        <div class="time-slots" id="timeSlots"></div>
        <button class="back-btn" onclick="goToStep(1)">← חזרה ליומן</button>
      </div>

      <!-- שלב 3: טופס -->
      <div id="step3" class="booking-step hidden">
        <div class="step-label">שלב 3 מתוך 3 — פרטים אישיים</div>
        <div class="booking-summary" id="bookingSummary"></div>
        <form id="appointmentForm" onsubmit="sendAppointment(event)">
          <label for="name">שם מלא:</label>
          <input type="text" id="name" placeholder="הכניסי שם מלא" required>

          <label for="phone">טלפון:</label>
          <input type="tel" id="phone" placeholder="050-0000000">

          <label for="serviceSelect">סוג טיפול:</label>
          <select id="serviceSelect" required>
            <option value="">בחרי סוג טיפול...</option>
            <option value="מניקור בסיסי - 80 ₪">מניקור בסיסי - 80 ₪</option>
            <option value="מניקור + לק ג'ל - 120 ₪">מניקור + לק ג'ל - 120 ₪</option>
            <option value="בניית ציפורניים - 180 ₪">בניית ציפורניים - 180 ₪</option>
          </select>

          <label for="styleSelect">עיצוב ציפורניים:</label>
          <select id="styleSelect">
            <option value="">בחרי עיצוב...</option>
            <optgroup label="📸 מהאלבום שלנו">
              <option>French Classic</option>
              <option>Glitter Ombre</option>
              <option>Colorful</option>
              <option>עיצוב קלאסי</option>
              <option>עיצוב אלגנטי</option>
              <option>עיצוב צבעוני</option>
            </optgroup>
            <optgroup label="✨ קלאסי">
              <option>Red Classic</option>
              <option>Nude Natural</option>
              <option>Black Matte</option>
              <option>Burgundy Wine</option>
              <option>Pure White</option>
              <option>Dark Navy</option>
            </optgroup>
            <optgroup label="🌸 פסטל">
              <option>Baby Pink</option>
              <option>Baby Blue</option>
              <option>Lavender</option>
              <option>Mint Green</option>
              <option>Peach Cream</option>
              <option>Lilac Dream</option>
              <option>Coral Reef</option>
              <option>Dusty Rose</option>
            </optgroup>
            <optgroup label="🌅 אומברה">
              <option>Sunset Ombre</option>
              <option>Ocean Blue</option>
              <option>Rose Gold</option>
              <option>Berry Bliss</option>
              <option>Forest Green</option>
              <option>Rainbow</option>
            </optgroup>
            <optgroup label="💎 מיוחד">
              <option>Marble</option>
              <option>Gold Chrome</option>
              <option>Holographic</option>
              <option>Pink Glitter</option>
              <option>Galaxy</option>
              <option>Silver Chrome</option>
              <option>Leopard Print</option>
              <option>Geometric Lines</option>
            </optgroup>
          </select>

          <label for="note">הערות נוספות:</label>
          <textarea id="note" placeholder="כתבי כאן הערות..."></textarea>

          <button type="submit">אשרי תור</button>
        </form>
        <button class="back-btn" onclick="goToStep(2)">← חזרה לשעות</button>
        <div id="confirmMsg" class="confirm-msg"></div>
      </div>

    </div>
  </main>

  <footer>
    <div class="footer-content">
      <p>💅 Inbal Moshe &copy; 2025</p>
      <p>עיצוב ציפורניים מקצועי | nailart@example.com</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
